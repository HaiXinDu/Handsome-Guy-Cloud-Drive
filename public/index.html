<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="文件共享网盘，支持文件和文件夹上传下载">
    <title>网盘</title>
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📁</text></svg>">
    <link rel="manifest" href="/manifest.json">
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --success-color: #10b981;
            --success-hover: #059669;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
            --bg-primary: #ffffff;
            --bg-secondary: #f9fafb;

            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }


        .content {
            padding: 30px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: space-between;
        }


        .search-input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 14px;
            transition: var(--transition);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            padding: 15px;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
        }

        .pagination-info {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .selectable-item {
            transition: var(--transition);
        }

        .selectable-item.selected {
            background: #f0f9ff;
            border-color: var(--primary-color);
        }

        .bulk-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            padding: 10px 15px;
            background: #fef3c7;
            border-radius: var(--radius-md);
            border: 1px solid #fcd34d;
            align-items: center;
        }

        .bulk-actions.hidden {
            display: none;
        }

        .preview-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .preview-modal.hidden {
            display: none;
        }

        .preview-content {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
        }

        .preview-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .preview-close:hover {
            transform: rotate(90deg);
        }

        .upload-area {
            border: 3px dashed var(--border-color);
            border-radius: var(--radius-md);
            padding: 50px 30px;
            text-align: center;
            margin: 20px 0;
            transition: var(--transition);
            background: var(--bg-secondary);
            position: relative;
            overflow: hidden;
        }

        .upload-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(37, 99, 235, 0.05) 50%, transparent 70%);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary-color);
            background: #f0f9ff;
            transform: scale(1.02);
        }

        .upload-area:hover::before, .upload-area.dragover::before {
            transform: translateX(100%);
        }

        .upload-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        /* 上传队列 */
        .upload-queue {
            margin: 0;
        }

        .queue-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .queue-item:last-child { border-bottom: none; }

        .queue-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .queue-info {
            flex: 1;
            min-width: 0;
        }

        .queue-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .queue-size {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .queue-progress {
            width: 100px;
            height: 6px;
            background: var(--border-color);
            border-radius: 3px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .queue-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), #3b82f6);
            transition: width 0.2s ease;
        }

        .queue-status {
            font-size: 11px;
            color: var(--text-secondary);
            flex-shrink: 0;
            min-width: 50px;
            text-align: right;
        }

        .queue-status.success { color: var(--success-color); }
        .queue-status.error { color: var(--danger-color); }
        .queue-status.skipped { color: var(--warning-color); }

        .upload-controls {
            display: grid;
            gap: 15px;
            margin-top: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-weight: 500;
            color: var(--text-primary);
        }

        .form-group select,
        .form-group input {
            padding: 10px 12px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 14px;
            transition: var(--transition);
            background: var(--bg-primary);
        }

        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-hint {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: var(--text-secondary);
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: var(--success-color);
        }

        .btn-secondary:hover {
            background: var(--success-hover);
        }

        .btn-success {
            background: var(--success-color);
        }

        .btn-danger {
            background: var(--danger-color);
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 14px;
            border-radius: var(--radius-sm);
        }

        .progress {
            width: 100%;
            height: 8px;
            background: var(--border-color);
            border-radius: var(--radius-sm);
            overflow: hidden;
            margin: 15px 0;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), #3b82f6);
            transition: width 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.3),
                transparent
            );
            transform: translateX(-100%);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--success-color);
            color: white;
            padding: 16px 20px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            animation: slideIn 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            max-width: 350px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.error {
            background: var(--danger-color);
        }

        .toast.warning {
            background: var(--warning-color);
        }

        @keyframes slideIn {
            from { 
                transform: translateX(100%);
                opacity: 0;
            }
            to { 
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast.fade-out {
            animation: fadeOut 0.3s ease-out forwards;
        }

        @keyframes fadeOut {
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }

        .hidden {
            display: none;
        }

        .folder-info {
            background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
            border: 1px solid #bfdbfe;
            border-radius: var(--radius-md);
            padding: 20px;
            margin: 20px 0;
        }

        .file-list, .folder-list {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        .file-item, .folder-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .file-item:last-child, .folder-item:last-child {
            border-bottom: none;
        }

        .file-item:hover, .folder-item:hover {
            background: var(--bg-secondary);
        }

        .file-info, .folder-info-item {
            flex: 1;
            min-width: 0;
        }

        .file-name, .folder-name {
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 4px;
            word-break: break-word;
        }

        .file-meta, .folder-meta {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .file-actions, .folder-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .stats-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 20px;
            margin-top: 20px;
            text-align: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                border-radius: var(--radius-md);
            }

            .content {
                padding: 20px 15px;
            }

            .upload-area {
                padding: 30px 20px;
            }

            .button-group {
                flex-direction: column;
            }

            .file-item, .folder-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .file-actions, .folder-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }


        /* 文件类型图标 */
        .file-icon {
            margin-right: 8px;
            font-size: 1.2em;
        }

        .folder-icon {
            color: #f59e0b;
            margin-right: 8px;
            font-size: 1.2em;
        }

    </style>
</head>
<body>
    <div class="container">
        <main class="content">

            <!-- 上传区域 -->
            <section class="section">
                <h2 class="section-title">📤 文件上传</h2>
                
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📤</div>
                    <h3 style="margin: 10px 0;">拖拽文件到这里，或点击选择</h3>
                    <p style="color: var(--text-secondary); margin: 10px 0;">支持单个文件、多个文件和整个文件夹</p>
                    
                    <div class="upload-controls">
                        <div class="form-group">
                            <label for="folderSelect">选择目标文件夹：</label>
                            <select id="folderSelect">
                                <option value="">新建文件夹（自定义命名）</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="folderNameInput">自定义文件夹名称：</label>
                            <input type="text" id="folderNameInput" placeholder="输入文件夹名称（可选）">
                            <small class="form-hint">留空将使用时间戳命名</small>
                        </div>
                        
                        <div class="button-group">
                            <input type="file" id="fileInput" multiple style="display: none;">
                            <button class="btn" onclick="selectFiles()">📁 选择文件</button>
                            <button class="btn" onclick="selectFolders()">📂 选择文件夹</button>
                            <button class="btn btn-secondary" onclick="refreshFolders()">🔄 刷新文件夹</button>
                        </div>
                    </div>
                </div>
                
                <div class="progress hidden" id="progressContainer">
                    <div class="progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="upload-queue hidden" id="uploadQueue"></div>
                
                <div id="folderInfo" class="folder-info hidden"></div>
                
                <div class="file-list hidden" id="fileList"></div>
            </section>
            
            <!-- 文件管理区域 -->
            <section class="section">
                <h2 class="section-title">
                    📂 文件管理
                    <input type="text" id="searchInput" class="search-input" placeholder="🔍 搜索文件..." oninput="appState.searchQuery = this.value; appState.currentPage = 1; folderManager.loadFolderList()">
                </h2>

                <div class="bulk-actions hidden" id="bulkActions">
                    <span class="selected-count">已选择 0 项</span>
                    <button class="btn btn-small btn-success" onclick="fileManager.bulkDownload()">
                        📥 批量下载
                    </button>
                    <button class="btn btn-small btn-danger" onclick="fileManager.bulkDelete()">
                        🗑️ 批量删除
                    </button>
                </div>

                <div class="folder-list" id="folderList">
                    <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
                        <div style="font-size: 3rem; margin-bottom: 10px;">📁</div>
                        <p>正在加载文件夹列表...</p>
                    </div>
                </div>
                
                <div class="stats-card hidden" id="statsCard">
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value" id="totalFiles">0</div>
                            <div class="stat-label">文件总数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="totalFolders">0</div>
                            <div class="stat-label">文件夹数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="totalSize">0 B</div>
                            <div class="stat-label">总大小</div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script>
        // 全局变量和配置
        const APP_CONFIG = {
            retryAttempts: 3,
            retryDelay: 1000,
            toastDuration: 3000
        };

        // DOM元素
        const elements = {
            uploadArea: document.getElementById('uploadArea'),
            fileInput: document.getElementById('fileInput'),
            progressContainer: document.getElementById('progressContainer'),
            progressBar: document.getElementById('progressBar'),
            uploadQueue: document.getElementById('uploadQueue'),
            fileList: document.getElementById('fileList'),
            folderInfo: document.getElementById('folderInfo'),
            folderSelect: document.getElementById('folderSelect'),
            folderNameInput: document.getElementById('folderNameInput'),
            folderList: document.getElementById('folderList'),
            statsCard: document.getElementById('statsCard'),
            totalFiles: document.getElementById('totalFiles'),
            totalFolders: document.getElementById('totalFolders'),
            totalSize: document.getElementById('totalSize'),
            searchInput: document.getElementById('searchInput'),
            bulkActions: document.getElementById('bulkActions')
        };

        // 应用状态
        const appState = {
            currentPath: '',
            isUploading: false,

            currentPage: 1,
            pageSize: 50,
            searchQuery: '',
            selectedItems: new Set(),
            stats: {
                totalFiles: 0,
                totalFolders: 0,
                totalSize: 0
            }
        };

        // 事件处理器
        const eventHandlers = {
            // 初始化事件监听
            init() {
                this.setupDragAndDrop();
                this.setupClickHandlers();
                this.setupFileInputHandler();
            },

            // 设置拖拽事件
            setupDragAndDrop() {
                const dragOverHandler = (e) => {
                    e.preventDefault();
                    elements.uploadArea.classList.add('dragover');
                };

                const dragLeaveHandler = (e) => {
                    e.preventDefault();
                    elements.uploadArea.classList.remove('dragover');
                };

                const dropHandler = (e) => {
                    e.preventDefault();
                    elements.uploadArea.classList.remove('dragover');
                    
                    const items = e.dataTransfer.items;
                    if (items && items.length > 0) {
                        this.handleDraggedItems(items);
                    } else {
                        const files = Array.from(e.dataTransfer.files);
                        uploadManager.uploadFiles(files);
                    }
                };

                elements.uploadArea.addEventListener('dragover', dragOverHandler);
                elements.uploadArea.addEventListener('dragleave', dragLeaveHandler);
                elements.uploadArea.addEventListener('drop', dropHandler);

                // 防止默认拖拽行为
                document.addEventListener('dragover', (e) => e.preventDefault());
                document.addEventListener('drop', (e) => e.preventDefault());
            },

            // 设置点击事件
            setupClickHandlers() {
                elements.uploadArea.addEventListener('click', (e) => {
                    // 如果点击的是表单元素，不触发文件选择
                    if (e.target.tagName === 'SELECT' || 
                        e.target.tagName === 'BUTTON' || 
                        e.target.tagName === 'INPUT' ||
                        e.target.closest('select') || 
                        e.target.closest('button') ||
                        e.target.closest('input')) {
                        return;
                    }
                    this.selectFiles();
                });

                // 表单元素阻止事件冒泡
                [elements.folderSelect, elements.folderNameInput].forEach(element => {
                    if (element) {
                        element.addEventListener('click', (e) => e.stopPropagation());
                    }
                });
            },

            // 设置文件输入处理器
            setupFileInputHandler() {
                elements.fileInput.addEventListener('change', (e) => {
                    const files = Array.from(e.target.files);
                    if (files.length === 0) return;

                    if (elements.fileInput.hasAttribute('webkitdirectory')) {
                        // 文件夹上传
                        uploadManager.uploadFiles(files);
                    } else {
                        // 普通文件上传
                        uploadManager.uploadFiles(files);
                    }
                });
            },

            // 处理拖拽的项目
            async handleDraggedItems(items) {
                try {
                    const files = await this.processDraggedItems(items);
                    uploadManager.uploadFiles(files);
                } catch (error) {
                    console.error('处理拖拽项目失败:', error);
                    utils.showToast('处理拖拽项目失败', 'error');
                }
            },

            // 处理拖拽项目（异步）- 递归保留完整文件夹层级
            processDraggedItems(items) {
                return new Promise((resolve) => {
                    const files = [];
                    const itemsArray = Array.from(items);
                    let pending = 0;      // 待处理的条目数（含嵌套）
                    let resolved = false;

                    const checkDone = () => {
                        if (!resolved && pending === 0) {
                            resolved = true;
                            resolve(files);
                        }
                    };

                    const processEntry = (entry, relativePath = '') => {
                        const fullPath = relativePath ? `${relativePath}/${entry.name}` : entry.name;

                        if (entry.isFile) {
                            pending++;
                            entry.file(file => {
                                file.relativePath = fullPath;
                                files.push(file);
                                pending--;
                                checkDone();
                            });
                        } else if (entry.isDirectory) {
                            pending++;
                            const dirReader = entry.createReader();
                            const dirPath = fullPath + '/';

                            const readEntries = () => {
                                dirReader.readEntries(entries => {
                                    if (entries.length > 0) {
                                        entries.forEach(subEntry => processEntry(subEntry, dirPath));
                                        readEntries(); // 继续读取下一批（chromium 限制每次最多 100 条）
                                    } else {
                                        // 所有子条目处理完毕
                                        pending--;
                                        checkDone();
                                    }
                                });
                            };

                            readEntries();
                        }
                    };

                    itemsArray.forEach(item => {
                        const entry = item.webkitGetAsEntry();
                        if (entry) {
                            processEntry(entry);
                        } else {
                            const file = item.getAsFile?.();
                            if (file) {
                                files.push(file);
                            }
                        }
                    });

                    // 没有有效条目的边缘情况
                    if (pending === 0) {
                        resolve(files);
                    }
                });
            },

            // 选择文件
            selectFiles() {
                elements.fileInput.removeAttribute('webkitdirectory');
                elements.fileInput.value = '';
                elements.fileInput.click();
            },

            // 选择文件夹
            selectFolders() {
                elements.fileInput.setAttribute('webkitdirectory', '');
                elements.fileInput.value = '';
                elements.fileInput.click();
            },

            // 刷新文件夹列表
            refreshFolders() {
                folderManager.loadFolderList();
                uploadManager.loadFolderSelector();
                utils.showToast('文件夹列表已刷新', 'success');
            }
        };


        // 上传文件管理器（支持分块上传、断点续传、并行传输、去重）
        const uploadManager = {
            CHUNK_SIZE: 5 * 1024 * 1024,     // 5MB 每块
            MAX_PARALLEL: 3,                   // 每文件并行块数
            CHUNK_RETRIES: 3,                  // 分块失败重试次数
            CHUNK_TIMEOUT: 60000,              // 单块超时 60s

            queueActive: false,
            uploadResults: [],

            async uploadFiles(files) {
                if (!files || files.length === 0) return;
                if (this.queueActive) {
                    utils.showToast('正在上传中，请稍候', 'warning');
                    return;
                }

                // 验证文件
                try {
                    for (const file of files) {
                        utils.validateFile(file);
                    }
                } catch (e) {
                    utils.showToast(e.message, 'error');
                    return;
                }

                this.queueActive = true;
                this.uploadResults = [];
                elements.uploadQueue.classList.remove('hidden');
                elements.progressContainer.classList.remove('hidden');

                const totalSize = files.reduce((s, f) => s + f.size, 0);
                let uploadedSize = 0;

                // 初始化队列 UI
                const queueItems = files.map((file, i) => ({
                    id: `q_${Date.now()}_${i}`,
                    file, size: file.size,
                    progress: 0,
                    status: 'pending',  // pending | uploading | success | error | skipped
                    el: this._createQueueElement(file, i)
                }));
                this._renderQueue(queueItems);

                // 逐个上传（队列化避免服务端过载）
                for (const item of queueItems) {
                    item.status = 'uploading';
                    this._updateQueueItem(item);

                    try {
                        const file = item.file;
                        const sizeMB = file.size / 1024 / 1024;
                        const useChunked = file.size > 10 * 1024 * 1024; // >10MB 用分块

                        let result;
                        if (useChunked) {
                            result = await this._uploadChunked(file, (progress) => {
                                item.progress = progress;
                                this._updateQueueItem(item);
                                // 更新总进度
                                uploadedSize = this._calcUploadedSize(queueItems, uploadedSize, progress, item);
                                elements.progressBar.style.width =
                                    Math.round((uploadedSize / totalSize) * 100) + '%';
                            }, item);
                        } else {
                            result = await this._uploadSingle(file, (progress) => {
                                item.progress = progress;
                                this._updateQueueItem(item);
                                uploadedSize = this._calcUploadedSize(queueItems, uploadedSize, progress, item);
                                elements.progressBar.style.width =
                                    Math.round((uploadedSize / totalSize) * 100) + '%';
                            });
                        }

                        if (result.dedupSkipped) {
                            item.status = 'skipped';
                            item.progress = 100;
                        } else {
                            item.status = 'success';
                            item.progress = 100;
                        }
                        this.uploadResults.push(result);
                    } catch (err) {
                        item.status = 'error';
                        item.error = err.message;
                        this.uploadResults.push({ error: err.message, fileName: item.file.name });
                    }
                    this._updateQueueItem(item);
                }

                // 汇总结果
                const successCount = this.uploadResults.filter(r => r.success && !r.dedupSkipped).length;
                const skippedCount = this.uploadResults.filter(r => r.dedupSkipped).length;
                const errorCount = this.uploadResults.filter(r => r.error).length;

                let msg = `成功上传 ${successCount} 个文件`;
                if (skippedCount > 0) msg += `，跳过 ${skippedCount} 个重复文件`;
                if (errorCount > 0) msg += `，${errorCount} 个失败`;
                utils.showToast(msg, errorCount > 0 ? 'warning' : 'success');

                this._displayUploadResult();
                folderManager.loadFolderList();
                this.loadFolderSelector();

                // 延迟隐藏
                setTimeout(() => {
                    elements.progressContainer.classList.add('hidden');
                    elements.uploadQueue.classList.add('hidden');
                }, 3000);

                this.queueActive = false;
            },

            // 计算已上传总大小
            _calcUploadedSize(queueItems, prevSize, newProgress, item) {
                let total = 0;
                for (const qi of queueItems) {
                    const ratio = qi === item ? newProgress / 100 : qi.progress / 100;
                    total += qi.size * ratio;
                }
                return total;
            },

            // 单文件上传（<10MB 的传统方式）
            _uploadSingle(file, onProgress) {
                return new Promise((resolve, reject) => {
                    const formData = new FormData();
                    const selectedFolder = elements.folderSelect.value;
                    const customFolderName = elements.folderNameInput.value.trim();
                    if (selectedFolder) formData.append('targetFolder', selectedFolder);
                    else if (customFolderName) formData.append('customFolderName', customFolderName);
                    formData.append('files', file, file.relativePath || file.name);

                    const xhr = new XMLHttpRequest();
                    xhr.upload.addEventListener('progress', utils.throttle(e => {
                        if (e.lengthComputable) onProgress(Math.round((e.loaded / e.total) * 100));
                    }, 150));
                    xhr.addEventListener('load', () => {
                        if (xhr.status === 200) {
                            try { resolve(JSON.parse(xhr.responseText)); }
                            catch (e) { reject(new Error('响应解析失败')); }
                        } else {
                            try {
                                const err = JSON.parse(xhr.responseText);
                                reject(new Error(err.error || `上传失败(${xhr.status})`));
                            } catch (e) { reject(new Error(`上传失败(${xhr.status})`)); }
                        }
                    });
                    xhr.addEventListener('error', () => reject(new Error('网络错误')));
                    xhr.addEventListener('timeout', () => reject(new Error('上传超时')));
                    xhr.timeout = 600000;
                    xhr.open('POST', '/api/upload');
                    xhr.send(formData);
                });
            },

            // 分块上传（>10MB 大文件）
            async _uploadChunked(file, onProgress, queueItem) {
                const totalChunks = Math.ceil(file.size / this.CHUNK_SIZE);
                const uploadId = `${Date.now().toString(36)}_${crypto.randomUUID().substring(0, 8)}`;

                // 检查是否有断点续传
                let completedChunks = new Set();
                try {
                    const statusRes = await fetch(`/api/upload/chunks/${uploadId}`);
                    // 新 uploadId 不会有旧数据，这里仅为未来扩展留接口
                } catch (e) { /* ignore */ }

                onProgress(0);

                // 构建待上传分块列表
                const pendingChunks = [];
                for (let i = 0; i < totalChunks; i++) {
                    if (!completedChunks.has(i)) {
                        pendingChunks.push(i);
                    }
                }

                let uploadedChunks = completedChunks.size;
                const updateProgress = () => {
                    const pct = Math.round((uploadedChunks / totalChunks) * 100);
                    onProgress(pct);
                };
                updateProgress();

                // 并行上传分块
                let activeTasks = 0;
                let chunkIndex = 0;
                let lastError = null;

                const uploadChunk = async (ci) => {
                    for (let attempt = 0; attempt < this.CHUNK_RETRIES; attempt++) {
                        try {
                            const start = ci * this.CHUNK_SIZE;
                            const end = Math.min(start + this.CHUNK_SIZE, file.size);
                            const blob = file.slice(start, end);

                            const formData = new FormData();
                            formData.append('uploadId', uploadId);
                            formData.append('chunkIndex', ci);
                            formData.append('totalChunks', totalChunks);
                            formData.append('fileName', file.relativePath || file.name);
                            formData.append('relativePath', file.relativePath || '');
                            formData.append('chunk', blob, `chunk_${ci}`);

                            const xhr = new XMLHttpRequest();
                            await new Promise((resolve, reject) => {
                                xhr.addEventListener('load', () => {
                                    if (xhr.status === 200) resolve();
                                    else reject(new Error(`HTTP ${xhr.status}`));
                                });
                                xhr.addEventListener('error', () => reject(new Error('网络错误')));
                                xhr.addEventListener('timeout', () => reject(new Error('分块超时')));
                                xhr.timeout = this.CHUNK_TIMEOUT;
                                xhr.open('POST', '/api/upload/chunk');
                                xhr.send(formData);
                            });

                            uploadedChunks++;
                            updateProgress();
                            return; // 成功，退出重试循环
                        } catch (err) {
                            lastError = err;
                            if (attempt < this.CHUNK_RETRIES - 1) {
                                await new Promise(r => setTimeout(r, 1000 * (attempt + 1))); // 递增延迟
                            }
                            console.warn(`分块 ${ci} 第${attempt + 1}次重试`, err.message);
                        }
                    }
                    throw new Error(`分块 ${ci} 上传失败（已重试${this.CHUNK_RETRIES}次）: ${lastError?.message}`);
                };

                // 启动并行任务
                const workers = [];
                for (let w = 0; w < this.MAX_PARALLEL && w < totalChunks; w++) {
                    workers.push((async () => {
                        while (chunkIndex < totalChunks) {
                            const ci = chunkIndex++;
                            await uploadChunk(ci);
                        }
                    })());
                }
                await Promise.all(workers);

                // 合并分块
                const mergeFormData = new FormData();
                mergeFormData.append('uploadId', uploadId);
                const selectedFolder = elements.folderSelect.value;
                const customFolderName = elements.folderNameInput.value.trim();
                if (selectedFolder) mergeFormData.append('targetFolder', selectedFolder);
                else if (customFolderName) mergeFormData.append('customFolderName', customFolderName);

                const mergeRes = await fetch('/api/upload/merge', {
                    method: 'POST',
                    body: mergeFormData
                });

                if (!mergeRes.ok) {
                    const errData = await mergeRes.json().catch(() => ({}));
                    throw new Error(errData.error || '合并分块失败');
                }

                return await mergeRes.json();
            },

            // 创建队列项 DOM
            _createQueueElement(file, index) {
                const icon = utils.getFileIcon(file.name);
                const sizeStr = utils.formatFileSize(file.size);
                return { icon, name: file.relativePath || file.name, size: sizeStr };
            },

            _renderQueue(queueItems) {
                elements.uploadQueue.innerHTML = queueItems.map((item, i) => `
                    <div class="queue-item" id="queue-item-${item.id}">
                        <span class="queue-icon">${item.el.icon}</span>
                        <div class="queue-info">
                            <div class="queue-name" title="${item.el.name}">${item.el.name}</div>
                            <div class="queue-size">${item.el.size}</div>
                        </div>
                        <div class="queue-progress">
                            <div class="queue-progress-bar" style="width: 0%"></div>
                        </div>
                        <span class="queue-status">等待</span>
                    </div>
                `).join('');
            },

            _updateQueueItem(item) {
                const el = document.getElementById(`queue-item-${item.id}`);
                if (!el) return;
                const bar = el.querySelector('.queue-progress-bar');
                const status = el.querySelector('.queue-status');
                if (bar) bar.style.width = item.progress + '%';

                const statusMap = {
                    pending: { text: '等待', cls: '' },
                    uploading: { text: `${item.progress}%`, cls: '' },
                    success: { text: '✓ 完成', cls: 'success' },
                    skipped: { text: '已存在', cls: 'skipped' },
                    error: { text: '✗ 失败', cls: 'error' }
                };
                const s = statusMap[item.status] || statusMap.pending;
                status.textContent = s.text;
                status.className = 'queue-status' + (s.cls ? ' ' + s.cls : '');
            },

            _displayUploadResult() {
                const successResults = this.uploadResults.filter(r => r.success);
                const skippedResults = this.uploadResults.filter(r => r.dedupSkipped);
                const allUploaded = [...successResults, ...skippedResults];

                if (allUploaded.length > 0) {
                    const firstResult = allUploaded[0];
                    const totalSize = allUploaded.reduce((s, r) => s + (r.size || 0), 0);

                    elements.folderInfo.innerHTML = `
                        <strong>📤 上传完成</strong>
                        <div style="margin-top: 10px; font-size: 14px;">
                            <div>📁 文件夹：${firstResult.folder || '当前目录'}</div>
                            <div>📊 文件数量：${successResults.length} 个成功${skippedResults.length > 0 ? `，${skippedResults.length} 个跳过（已存在）` : ''}</div>
                            <div>💾 大小：${utils.formatFileSize(totalSize)}</div>
                        </div>
                    `;
                    elements.folderInfo.classList.remove('hidden');

                    elements.fileList.innerHTML = `
                        <h3 style="margin:15px 0 10px">📄 上传的文件：</h3>
                        <div class="file-list">
                            ${allUploaded.map(r => `
                                <div class="file-item">
                                    <div class="file-info">
                                        <div class="file-name">
                                            <span class="file-icon">${utils.getFileIcon(r.fileName || '')}</span>
                                            ${r.fileName || r.originalName || '未知'}
                                            ${r.dedupSkipped ? '<span style="color:#f59e0b;font-size:12px"> (已存在)</span>' : ''}
                                        </div>
                                        <div class="file-meta">
                                            <span>${utils.formatFileSize(r.size || 0)}</span>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                    elements.fileList.classList.remove('hidden');
                }
            },

            loadFolderSelector() {
                fetch('/api/files')
                    .then(res => res.json())
                    .then(data => {
                        const folders = data.files.filter(item => item.type === 'folder');
                        elements.folderSelect.innerHTML = '<option value="">新建文件夹（自定义命名）</option>';
                        folders.forEach(folder => {

                            elements.folderSelect.appendChild(option);

                        console.error('获取文件夹列表失败:', error);

        };

        // 文件管理器
        const fileManager = {
            // 下载文件
            downloadFile(filename, folderPath) {
                const url = `/api/download/${encodeURIComponent(filename)}?path=${encodeURIComponent(folderPath)}`;
                const link = document.createElement('a');
                link.href = url;
                link.download = filename;
                link.target = '_blank';
                link.setAttribute('download', filename);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                utils.showToast(`开始下载 ${filename}`, 'success');
            },

            // 预览文件
            previewFile(filename, folderPath) {
                const fullPath = folderPath ? `${folderPath}/${filename}` : filename;
                const dotIndex = filename.lastIndexOf('.');
                const ext = dotIndex >= 0 ? filename.substring(dotIndex).toLowerCase() : '';

                // 图片直接在模态框中预览
                if (['.jpg', '.jpeg', '.png', '.gif', '.webp', '.bmp'].includes(ext)) {
                    const modal = document.createElement('div');
                    modal.className = 'preview-modal';
                    modal.innerHTML = `
                        <button class="preview-close" onclick="this.parentElement.remove()">×</button>
                        <img src="/api/preview/${encodeURIComponent(fullPath)}" class="preview-content" alt="${filename}">
                    `;
                    document.body.appendChild(modal);
                    modal.onclick = (e) => {
                        if (e.target === modal) modal.remove();
                    };
                } else if (['.pdf'].includes(ext)) {
                    // PDF 在新窗口打开
                    window.open(`/api/preview/${encodeURIComponent(fullPath)}`, '_blank');
                } else {
                    utils.showToast('此文件类型不支持预览', 'warning');
                }
            },

            // 原始下载（绕过所有处理，直接下载原始文件）
            downloadRawFile(filename, folderPath) {
                const fullPath = folderPath ? `${folderPath}/${filename}` : filename;
                const url = `/api/raw/${encodeURIComponent(fullPath)}`;
                const link = document.createElement('a');
                link.href = url;
                link.download = filename;
                link.target = '_blank';
                link.setAttribute('download', filename);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                utils.showToast(`开始原始下载 ${filename}`, 'success');
            },

            // 下载文件夹（打包为 zip）
            downloadFolder(folderPath) {
                const url = `/api/download-folder?path=${encodeURIComponent(folderPath)}`;
                const link = document.createElement('a');
                link.href = url;
                link.download = '';
                link.target = '_blank';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                const folderName = folderPath.split('/').pop();
                utils.showToast(`开始下载文件夹 ${folderName}`, 'success');
            },

            // 批量下载（逐个下载选中项，智能识别文件/文件夹）
            async bulkDownload() {
                const items = Array.from(appState.selectedItems);
                if (items.length === 0) return;

                // 分类：有扩展名 → 文件，无扩展名 → 文件夹
                const files = [];
                const folders = [];
                for (const itemPath of items) {
                    const name = itemPath.split('/').pop();
                    if (/\.[a-zA-Z0-9]{1,10}$/.test(name)) {
                        files.push(itemPath);
                    } else {
                        folders.push(itemPath);
                    }
                }
                const totalCount = files.length + folders.length;

                if (totalCount > 5 && !confirm(`已选择 ${totalCount} 项（${folders.length} 个文件夹 + ${files.length} 个文件），浏览器可能阻止多个同时下载。\n\n是否继续？`)) {
                    return;
                }

                utils.showToast(`开始下载 ${totalCount} 项`, 'success');

                const DELAY = 400; // 间隔时间，避免浏览器拦截

                // 下载文件夹（zip）
                for (const folderPath of folders) {
                    const link = document.createElement('a');
                    link.href = `/api/download-folder?path=${encodeURIComponent(folderPath)}`;
                    link.target = '_blank';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    await new Promise(r => setTimeout(r, DELAY));
                }

                // 下载文件
                for (const filePath of files) {
                    const lastSlash = filePath.lastIndexOf('/');
                    const fileName = lastSlash >= 0 ? filePath.substring(lastSlash + 1) : filePath;
                    const folderPath = lastSlash >= 0 ? filePath.substring(0, lastSlash) : '';
                    const link = document.createElement('a');
                    link.href = `/api/download/${encodeURIComponent(fileName)}?path=${encodeURIComponent(folderPath)}`;
                    link.download = fileName;
                    link.target = '_blank';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    await new Promise(r => setTimeout(r, DELAY));
                }

                appState.selectedItems.clear();
                this.updateBulkActions();
            },

                if (appState.selectedItems.has(itemPath)) {

                // 更新DOM中的视觉状态

                    itemEl.classList.toggle('selected', appState.selectedItems.has(itemPath));
                    const checkbox = itemEl.querySelector('input[type="checkbox"]');

                this.updateBulkActions();

                const bulkActions = elements.bulkActions;

                    bulkActions.classList.add('hidden');

            // 批量删除
            async bulkDelete() {
                if (!confirm(`确定要删除选中的 ${appState.selectedItems.size} 项吗？此操作不可恢复！`)) {
                    return;
                }

                try {
                    const paths = Array.from(appState.selectedItems);
                    const response = await fetch('/api/delete', {
                        method: 'DELETE',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ paths })
                    });

                    if (response.ok) {
                        appState.selectedItems.clear();
                        utils.showToast('批量删除成功', 'success');
                        folderManager.loadFolderList();
                    } else {
                        const error = await response.json();
                        throw new Error(error.error || '删除失败');
                    }
                } catch (error) {
                    utils.showToast(error.message || '删除失败', 'error');
                }
            },

            // 删除文件/文件夹
            async deleteItem(path, type) {
                if (!confirm(`确定要删除这个${type === 'folder' ? '文件夹' : '文件'}吗？此操作不可恢复！`)) {
                    return;
                }

                try {
                    const response = await fetch('/api/delete', {
                        method: 'DELETE',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ paths: [path] })
                    });

                    if (response.ok) {
                        utils.showToast('删除成功', 'success');
                        folderManager.loadFolderList();
                    } else {
                        const error = await response.json();
                        throw new Error(error.error || '删除失败');
                    }
                } catch (error) {
                    utils.showToast(error.message || '删除失败', 'error');
                }

        // 文件夹管理器
        const folderManager = {
            // 加载文件夹列表
            async loadFolderList(folderPath = '') {

                    const params = new URLSearchParams({
                        path: folderPath,

                    appState.currentPath = data.currentPath || '';

                    // 更新分页信息
                    if (data.pagination) {
                        appState.pagination = data.pagination;
                    }
                } catch (error) {
                    console.error('获取文件夹列表失败:', error);
                    utils.showToast('获取文件夹列表失败', 'error');
                    this.displayErrorState();
                }
            },

            // 显示文件夹列表
            displayFolderList(data) {
                const { files, currentPath } = data;
                
                let html = '';
                
                // 添加返回按钮
                if (currentPath) {
                    html += `
                        <div class="folder-item">
                            <div class="folder-info-item">
                                <div class="folder-name">
                                    <span class="folder-icon">🔙</span>
                                    返回上级目录
                                </div>
                                <div class="folder-meta">${currentPath}</div>
                            </div>
                            <div class="folder-actions">
                                <button class="btn btn-small btn-secondary" onclick="folderManager.navigateToParent()">
                                    返回
                                </button>
                            </div>
                        </div>
                    `;
                }
                
                // 显示文件夹和文件
                files.forEach(item => {
                    if (item.type === 'folder') {
                        html += this.renderFolderItem(item);
                    } else {
                        html += this.renderFileItem(item);
                    }
                });
                
                if (files.length === 0 && !currentPath) {
                    html = `
                        <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
                            <div style="font-size: 3rem; margin-bottom: 10px;">📁</div>
                            <p>暂无上传的文件</p>
                            <p style="font-size: 14px; margin-top: 10px;">拖拽文件到上方区域开始上传</p>
                        </div>
                    `;
                } else if (files.length === 0) {
                    html = `
                        <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
                            <div style="font-size: 3rem; margin-bottom: 10px;">📂</div>
                            <p>文件夹为空</p>
                        </div>
                    `;
                }

                elements.folderList.innerHTML = html;

                // 添加分页控件
                if (appState.pagination && appState.pagination.totalPages > 1) {
                    this.renderPagination();
                }
            },

            // 渲染分页
            renderPagination() {
                const pagination = appState.pagination;
                const paginationHtml = `
                    <div class="pagination">
                        <button class="btn btn-small" ${!pagination.hasPrev ? 'disabled' : ''} onclick="appState.currentPage--; folderManager.loadFolderList()">
                            ← 上一页
                        </button>
                        <span class="pagination-info">
                            第 ${pagination.currentPage} / ${pagination.totalPages} 页
                            (共 ${pagination.totalItems} 项)
                        </span>
                        <button class="btn btn-small" ${!pagination.hasNext ? 'disabled' : ''} onclick="appState.currentPage++; folderManager.loadFolderList()">
                            下一页 →
                        </button>
                    </div>
                `;

                // 插入到文件列表后面
                elements.folderList.insertAdjacentHTML('beforeend', paginationHtml);
            },

            // 渲染文件夹项
            renderFolderItem(folder) {
                const escapedName = utils.escapeHtml(folder.name);
                const escapedPath = utils.escapeHtml(folder.path);
                const isSelected = appState.selectedItems.has(folder.path);
                return `
                    <div class="folder-item selectable-item ${isSelected ? 'selected' : ''}" data-path="${escapedPath}" onclick="fileManager.toggleSelection('${escapedPath}')">
                        <div class="folder-info-item">
                            <div class="folder-name">
                                <input type="checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation()">
                                <span class="folder-icon">📁</span>
                                ${escapedName}
                            </div>
                            <div class="folder-meta">
                                <span>📊 ${utils.formatFileSize(folder.size)}</span>
                                <span>📅 ${utils.formatTime(folder.modified)}</span>
                            </div>
                        </div>
                        <div class="folder-actions" onclick="event.stopPropagation()">
                            <button class="btn btn-small" onclick="folderManager.navigateToFolder('${escapedName}')">
                                进入
                            </button>
                            <button class="btn btn-small btn-success" onclick="fileManager.downloadFolder('${escapedPath}')">
                                📥 下载
                            </button>
                            <button class="btn btn-small btn-danger" onclick="fileManager.deleteItem('${escapedPath}', 'folder')">
                                删除
                            </button>
                        </div>
                    </div>
                `;
            },

            // 渲染文件项
            renderFileItem(file) {
                const isImage = file.name.match(/\.(jpg|jpeg|png|gif|webp|bmp|svg)$/i);
                const isPDF = file.name.match(/\.pdf$/i);
                const canPreview = isImage || isPDF;
                const isSelected = appState.selectedItems.has(file.path);
                const folderPath = file.path.includes('/') ? file.path.substring(0, file.path.lastIndexOf('/')) : '';
                const escapedName = utils.escapeHtml(file.name);
                const escapedPath = utils.escapeHtml(file.path);
                const escapedFolderPath = utils.escapeHtml(folderPath);

                return `
                    <div class="file-item selectable-item ${isSelected ? 'selected' : ''}" data-path="${escapedPath}" onclick="fileManager.toggleSelection('${escapedPath}')">
                        <div class="file-info">
                            <div class="file-name">
                                <input type="checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation()">
                                <span class="file-icon">${utils.getFileIcon(file.name)}</span>
                                ${escapedName}
                            </div>
                            <div class="file-meta">
                                <span>${utils.formatFileSize(file.size)}</span>
                                <span>${utils.formatTime(file.modified)}</span>
                                <span>${file.mime || '未知类型'}</span>
                            </div>
                        </div>
                        <div class="file-actions" onclick="event.stopPropagation()">
                            ${canPreview ? `
                                <button class="btn btn-small" onclick="fileManager.previewFile('${escapedName}', '${escapedFolderPath}')" title="预览">
                                    👁️ 预览
                                </button>
                            ` : ''}
                            <button class="btn btn-small btn-success" onclick="fileManager.downloadFile('${escapedName}', '${escapedFolderPath}')">
                                📥 下载
                            </button>
                            ${isImage ? `
                                <button class="btn btn-small" onclick="fileManager.downloadRawFile('${escapedName}', '${escapedFolderPath}')" title="下载原始文件（推荐）">
                                    🔄 原始
                                </button>
                            ` : ''}
                            <button class="btn btn-small btn-danger" onclick="fileManager.deleteItem('${escapedPath}', 'file')">
                                删除
                            </button>
                        </div>
                    </div>
                `;
            },

            // 导航到文件夹
            navigateToFolder(folderName) {
                const newPath = appState.currentPath ? 
                    `${appState.currentPath}/${folderName}` : folderName;
                this.loadFolderList(newPath);
            },

            // 返回上级目录
            navigateToParent() {
                if (appState.currentPath) {
                    const parentPath = appState.currentPath.split('/').slice(0, -1).join('/');
                    this.loadFolderList(parentPath);
                }
            },

            // 更新统计信息
            updateStats(stats) {
                if (stats) {
                    appState.stats = stats;
                    elements.totalFiles.textContent = stats.totalFiles || 0;
                    elements.totalFolders.textContent = stats.totalFolders || 0;
                    elements.totalSize.textContent = utils.formatFileSize(stats.grandTotal || 0);
                    elements.statsCard.classList.remove('hidden');
                }
            },

            // 显示错误状态
            displayErrorState() {
                elements.folderList.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
                        <div style="font-size: 3rem; margin-bottom: 10px;">❌</div>
                        <p>加载失败</p>
                        <button class="btn btn-small" onclick="folderManager.loadFolderList()" style="margin-top: 10px;">
                            🔄 重试
                        </button>
                    </div>
                `;
            }
        };

        // 工具函数
        const utils = {
            // HTML 转义（防 XSS）
            escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            },

            // 显示提示信息
            showToast(message, type = 'success', duration = APP_CONFIG.toastDuration) {
                // 移除现有的toast
                const existingToast = document.querySelector('.toast');
                if (existingToast) {
                    existingToast.remove();
                }

                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.innerHTML = `
                    <span>${type === 'success' ? '✓' : type === 'error' ? '✗' : '⚠'}</span>
                    <span>${message}</span>
                `;
                document.body.appendChild(toast);

                // 自动移除
                setTimeout(() => {
                    toast.classList.add('fade-out');
                    setTimeout(() => toast.remove(), 300);
                }, duration);
            },

            // 格式化文件大小
            formatFileSize(bytes) {
                if (bytes === 0) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            },

            // 格式化时间
            formatTime(date) {
                const d = new Date(date);
                return d.toLocaleString('zh-CN', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            },

            // 获取文件图标
            getFileIcon(filename) {
                const ext = filename.split('.').pop()?.toLowerCase();
                const iconMap = {
                    // 图片
                    'jpg': '🖼️', 'jpeg': '🖼️', 'png': '🖼️', 'gif': '🖼️', 'svg': '🖼️', 'webp': '🖼️',
                    // 文档
                    'pdf': '📄', 'doc': '📝', 'docx': '📝', 'txt': '📃', 'md': '📋',
                    // 表格
                    'xls': '📊', 'xlsx': '📊', 'csv': '📊',
                    // 代码
                    'js': '📜', 'html': '🌐', 'css': '🎨', 'json': '📋', 'xml': '📄',
                    // 压缩包
                    'zip': '🗜️', 'rar': '🗜️', '7z': '🗜️', 'tar': '🗜️', 'gz': '🗜️',
                    // 视频
                    'mp4': '🎬', 'avi': '🎬', 'mkv': '🎬', 'mov': '🎬', 'wmv': '🎬',
                    // 音频
                    'mp3': '🎵', 'wav': '🎵', 'flac': '🎵', 'aac': '🎵',
                    // 默认
                    'default': '📄'
                };
                return iconMap[ext] || iconMap.default;
            },


            // 节流函数
            throttle(func, limit) {
                let inThrottle;
                return function() {
                    const args = arguments;
                    const context = this;
                    if (!inThrottle) {
                        func.apply(context, args);
                        inThrottle = true;
                        setTimeout(() => inThrottle = false, limit);
                    }
                };
            },

            // 验证文件（不限制大小）
            validateFile(file) {
                return true;
            },


        };


        // 全局函数（供HTML调用）
        window.selectFiles = () => eventHandlers.selectFiles();
        window.selectFolders = () => eventHandlers.selectFolders();
        window.refreshFolders = () => eventHandlers.refreshFolders();

        // 页面初始化
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // 初始化事件处理器
                eventHandlers.init();
                
                // 加载服务器信息
                const response = await fetch('/api/info');
                const serverInfo = await response.json();
                console.log('服务器信息:', serverInfo);
                
                // 显示版本信息
                if (serverInfo.version) {
                    document.title += ` v${serverInfo.version}`;
                }
                
                // 加载文件夹列表
                await folderManager.loadFolderList();
                
                // 加载文件夹选择器
                uploadManager.loadFolderSelector();
                
                // 添加键盘快捷键
                document.addEventListener('keydown', (e) => {
                    if (e.ctrlKey || e.metaKey) {
                        switch(e.key) {
                            case 'o':
                                e.preventDefault();
                                eventHandlers.selectFiles();
                                break;
                            case 'r':
                                e.preventDefault();
                                eventHandlers.refreshFolders();
                                break;
                        }
                    }
                });
                
                utils.showToast('局域网网盘已就绪', 'success');
                
            } catch (error) {
                console.error('初始化失败:', error);
                utils.showToast('初始化失败，请刷新页面重试', 'error');
            }
        });

        // 页面卸载清理
        window.addEventListener('beforeunload', () => {
            if (appState.isUploading) {
                return '正在上传文件，确定要离开吗？';
            }
        });

        // 错误处理
        window.addEventListener('error', (event) => {
            console.error('全局错误:', event.error);
            utils.showToast('发生了一个错误', 'error');
        });

        window.addEventListener('unhandledrejection', (event) => {
            console.error('未处理的Promise拒绝:', event.reason);
            utils.showToast('操作失败', 'error');
        });

        // 性能监控
        if (window.performance && window.performance.timing) {
            window.addEventListener('load', () => {
                const timing = window.performance.timing;
                const loadTime = timing.loadEventEnd - timing.navigationStart;
                console.log(`页面加载时间: ${loadTime}ms`);
            });
        }


        // 开发模式下的调试工具
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
            window.debugInfo = {
                appState,
                elements,
                utils,
                uploadManager,
                fileManager,
                folderManager,
                eventHandlers
            };
            console.log('调试信息已暴露到 window.debugInfo');
        }
    </script>
</body>
</html>
